name: Brakewatch
options:
  bundleIdPrefix: com.shimondeitel.brakewatch
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "4"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Brakewatch:
    type: application
    platform: iOS
    sources:
      - path: Brakewatch
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.brakewatch
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Brakewatch/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  BrakewatchTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: BrakewatchTests
      - path: Brakewatch.storekit
    dependencies:
      - target: Brakewatch
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.brakewatch.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  BrakewatchUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: BrakewatchUITests
    dependencies:
      - target: Brakewatch
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.brakewatch.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Brakewatch:
    build:
      targets:
        Brakewatch: all
        BrakewatchTests: [test]
        BrakewatchUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Brakewatch.storekit
    test:
      config: Debug
      storeKitConfiguration: Brakewatch.storekit
      targets:
        - BrakewatchTests
        - BrakewatchUITests
    archive:
      config: Release
